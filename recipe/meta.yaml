{% set name = "napari-skimage" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/napari_skimage-{{ version }}.tar.gz
  sha256: 5582e7e3fe7341d581442f19a8b890a1abf1d671e2ebf018da8fc6f6997011ed

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - setuptools >=42.0.0
    - wheel
    - setuptools-scm
    - pip
  run:
    - python >=3.9
    - napari
    - numpy
    - magicgui
    - qtpy
    - scikit-image

test:
  imports:
    - napari_skimage
  commands:
    - pip check
  requires:
    - pip
    - pyqt

about:
  home: https://pypi.org/project/napari-skimage/
  summary: A napari plugin to apply scikit-image operations
  dev_url: https://github.com/guiwitz/napari-skimage
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - guiwitz
