{% set name = "napari-skimage" %}
{% set version = "0.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/napari_skimage-{{ version }}.tar.gz
  sha256: 0dd197526fce5cedb19124737770d07b7733ad8c591a0e8f317c709e447359bd

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42.0.0
    - wheel
    - setuptools-scm
    - pip
  run:
    - python >={{ python_min }}
    - napari
    - numpy
    - magicgui
    - qtpy
    - scikit-image

test:
  imports:
    - napari_skimage
  commands:
    - pip check
  requires:
    - pip
    - pyqt
    - python {{ python_min }}

about:
  home: https://pypi.org/project/napari-skimage/
  summary: A napari plugin to apply scikit-image operations
  dev_url: https://github.com/guiwitz/napari-skimage
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - guiwitz
